<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול פיננסי - משפחת לוזון</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>ניהול פיננסי - משפחת לוזון</h1>
    <div style="font-size: 0.9rem; margin-top: 5px;">מעקב הוצאות | חלוקת חיסכון דינמית</div>
</header>

<div class="container">
    
    <div class="tabs">
        <button id="tab-budget" class="tab-btn active" onclick="switchTab('budget')">ניהול תקציב שוטף</button>
        <button id="tab-savings" class="tab-btn" onclick="switchTab('savings')">חלוקת חיסכון (5 בחודש)</button>
    </div>

    <div id="budget" class="section active">
        <div class="card">
            <h2>הוספת הוצאה חדשה</h2>
            <div class="form-group">
                <label>קטגוריה</label>
                <select id="expenseCategory"></select>
            </div>
            <div class="form-group">
                <label>סכום (בש"ח)</label>
                <input type="number" id="expenseAmount" placeholder="סכום ההוצאה">
            </div>
            <button class="action-btn" onclick="addExpense()">הוסף הוצאה</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>מצב התקציב החודשי</h2>
                <button onclick="resetMonth()" class="reset-btn">איפוס חודש חדש</button>
            </div>
            <div id="budgetList"></div>
        </div>

        <div class="card">
            <h2>ניהול קטגוריות הוצאה</h2>
            <div class="inline-form">
                <input type="text" id="newCatName" placeholder="שם קטגוריה">
                <input type="number" id="newCatBudget" placeholder="תקציב">
                <button class="action-btn" onclick="addCategory()">+</button>
            </div>
            <div id="categoriesList" class="management-list"></div>
        </div>
    </div>

    <div id="savings" class="section">
        <div class="card">
            <h2>מחשבון הפקדות</h2>
            <div class="form-group">
                <label>סכום כולל לחיסכון החודש:</label>
                <input type="number" id="totalSavingsInput" placeholder="לדוגמה: 3720">
            </div>
            <button class="action-btn" onclick="calculateSavings()">בצע חלוקה</button>
            
            <div id="savingsResult" style="display:none; margin-top: 1.5rem;">
                <h3>פירוט הפקדות:</h3>
                <table>
                    <thead>
                        <tr>
                            <th>מטרה</th>
                            <th>קרן</th>
                            <th>סכום</th>
                        </tr>
                    </thead>
                    <tbody id="savingsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>ניהול מטרות ואחוזי חיסכון</h2>
            <p style="font-size: 0.85rem; color: #666;">שימו לב: סך האחוזים חייב להסתכם ב-100%.</p>
            <div class="inline-form">
                <input type="text" id="newGoalName" placeholder="מטרה (לדוג' דירה)">
                <input type="text" id="newGoalFund" placeholder="שם/מספר קרן">
                <input type="number" id="newGoalPercent" placeholder="%" style="width: 70px;">
                <button class="action-btn" onclick="addSavingsRule()">+</button>
            </div>
            <div id="savingsRulesList" class="management-list"></div>
            <div id="totalPercentWarn" style="margin-top: 10px; font-weight: bold;"></div>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
